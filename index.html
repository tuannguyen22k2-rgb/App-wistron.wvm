<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>员工码</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2f3156">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="员工码">

<link rel="apple-touch-icon" href="icon-192.png">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    touch-action:none;
    user-select:none;
    -webkit-user-select:none;
    -webkit-touch-callout:none;
}
    
body{
    background:#000;
    font-family:Arial,sans-serif;
    margin:0;
}


.container{
    position:relative;
    width:100%;
    max-width:430px;
    margin:auto;
}

.background{
    width:100%;
    display:block;
}

.employee{
    position:absolute;
    top:4.5%;
    left:0;
    right:0;
    text-align:center;
    color:#f5e6b0;
    font-size:clamp(14px,4.5vw,20px);
    font-weight:500;
}

.clock{
    position:absolute;
    top:21%;
    left:0;
    right:0;
    text-align:center;
    color:#000;
    font-size:clamp(15px,4vw,18px);
    font-weight:500;
}

.status{
    position:absolute;
    top:58%;
    left:0;
    right:0;
    text-align:center;
    color:#67d86f;
    font-size:clamp(14px,4.2vw,20px);
    font-weight:600;
    animation:blink 1s infinite;
}

.countdown{
    position:absolute;
    top:61%;
    left:0;
    right:0;
    text-align:center;
    color:#67d86f;
    font-size:clamp(16px,4.2vw,18px);
    font-weight:500;
    animation:blink 0s infinite;
}



@keyframes blink{
    0%,100%{opacity:1;}
    50%{opacity:0.4;}
}



}
</style>
</head>

<body>

<div class="container">

    <img src="qrcode.jpg" class="background" alt="">

    <div class="employee" id="employee"></div>

    <div class="clock" id="clock"></div>

    <div class="status">已生效</div>

    <div class="countdown" id="countdown"></div>

</div>

<script>
// Lấy tham số từ URL
const params = new URLSearchParams(window.location.search);

// Nếu URL có id hoặc name thì lưu vào localStorage
if (params.has("id")) {
    localStorage.setItem("employeeId", params.get("id"));
}

if (params.has("name")) {
    localStorage.setItem("employeeName", params.get("name"));
}

// Lấy dữ liệu đã lưu
const id = localStorage.getItem("employeeId") || "V25100062";
const name = localStorage.getItem("employeeName") || "Orin Nguyen";

// Hiển thị
document.title = `${id} - ${name}`;

document.getElementById("employee").innerHTML =
    `${id} (${name})`;

function updateClock(){

    const d = new Date();

    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const day = String(d.getDate()).padStart(2,'0');

    const h = String(d.getHours()).padStart(2,'0');
    const min = String(d.getMinutes()).padStart(2,'0');
    const s = String(d.getSeconds()).padStart(2,'0');

    document.getElementById("clock").innerHTML =
    `${y}-${m}-${day} ${h}:${min}:${s}`;
}

updateClock();
setInterval(updateClock,1000);

let totalSeconds = 2 * 3600 + 32 * 60 + 20;

function updateCountdown() {

    const h = String(Math.floor(totalSeconds / 3600)).padStart(2, "0");
    const m = String(Math.floor((totalSeconds % 3600) / 60)).padStart(2, "0");
    const s = String(totalSeconds % 60).padStart(2, "0");

    document.getElementById("countdown").textContent = `${h}:${m}:${s}`;

    totalSeconds++;
}

updateCountdown();
setInterval(updateCountdown, 1000);

document.addEventListener('contextmenu', e => e.preventDefault());

document.addEventListener('gesturestart', e => e.preventDefault());

document.addEventListener('dblclick', e => {
    e.preventDefault();
});
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js');
    });
}                         

</script>

</body>
</html>
