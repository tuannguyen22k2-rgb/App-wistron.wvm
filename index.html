<head>

<style>
*{
    margin:0;
    padding:0;

    background:#000;
    font-family:Arial,sans-serif;

    position:absolute;

    position:absolute;
    bottom:120px;

</style>
</head>

<body>

<div class="container">

    <img src="qrcode.jpg" class="background" alt="">

    <div class="employee" id="employee"></div>

    <div class="clock" id="clock"></div>

    <div class="status">已生效</div>

    <div class="countdown" id="countdown">08:32:20</div>

    <div class="notice">
        尊敬的员工您好，您已进入企业涉密区域，<br>
        出于企业安全考虑，您的手机摄像头将被禁止拍摄，感谢您的配合。
    </div>

</div>

<script>

const params = new URLSearchParams(window.location.search);

const id = params.get("id") || "V25060141";
const name = params.get("name") || "Hà Đình Trung";

document.getElementById("employee").innerHTML =
`${id} (${name})`;

function updateClock(){

    const d = new Date();

    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const day = String(d.getDate()).padStart(2,'0');

    const h = String(d.getHours()).padStart(2,'0');
    const min = String(d.getMinutes()).padStart(2,'0');
    const s = String(d.getSeconds()).padStart(2,'0');

    document.getElementById("clock").innerHTML =
    `${y}-${m}-${day} ${h}:${min}:${s}`;
}

updateClock();
setInterval(updateClock,1000);

let totalSeconds = 8 * 3600 + 32 * 60 + 20;

function updateCountdown(){

    const h = Math.floor(totalSeconds / 3600);
    const m = Math.floor((totalSeconds % 3600) / 60);
    const s = totalSeconds % 60;

    document.getElementById("countdown").innerHTML =
    `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

    if(totalSeconds > 0){
        totalSeconds--;
    }
}

updateCountdown();
setInterval(updateCountdown,1000);

</script>

</body>
</html>
