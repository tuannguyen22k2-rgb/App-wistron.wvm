<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mã Nhân Viên</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#2a2d3a;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    background:#fff;
    border-radius:20px;
    padding:30px;
    max-width:400px;
    width:100%;
    box-shadow:0 10px 40px rgba(0,0,0,0.3);
    text-align:center;
}

.header-bar{
    background:#d4af37;
    border-radius:15px;
    padding:15px;
    margin-bottom:20px;
    color:#000;
    font-size:14px;
    font-weight:bold;
}

.employee{
    font-size:22px;
    font-weight:bold;
    color:#333;
    margin-bottom:20px;
}

.clock{
    font-size:16px;
    color:#666;
    margin-bottom:20px;
}

.qrcode-section{
    margin:20px 0;
    display:flex;
    justify-content:center;
}

.qrcode-section img{
    width:200px;
    height:200px;
    border:3px solid #f0f0f0;
}

.qr-label{
    font-size:14px;
    color:#999;
    margin-top:10px;
}

.status{
    color:#53d769;
    font-size:28px;
    font-weight:bold;
    margin:20px 0 10px 0;
}

.countdown{
    color:#53d769;
    font-size:26px;
    font-weight:bold;
    margin-bottom:30px;
}

.notice{
    background:#f5f5f5;
    border-radius:10px;
    padding:20px;
    color:#555;
    font-size:14px;
    line-height:1.8;
    margin-top:20px;
}

@media (max-width:480px){
    .container{
        padding:20px;
    }
    
    .qrcode-section img{
        width:150px;
        height:150px;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="header-bar">将二维码对准扫描器刷码出场</div>

    <div class="employee" id="employee"></div>

    <div class="clock" id="clock"></div>

    <div class="qrcode-section">
        <img src="qrcode.jpg" alt="QR Code">
    </div>

    <div class="qr-label">刷新二维码</div>

    <div class="status">已生效</div>

    <div class="countdown" id="countdown">08:32:20</div>

    <div class="notice">
        尊敬的员工您好，您已进入企业涉密区域，<br>
        出于企业安全考虑，您的手机摄像头将被禁止拍摄，感谢您的配合。
    </div>

</div>

<script>

const params = new URLSearchParams(window.location.search);

const id = params.get("id") || "V25060141";
const name = params.get("name") || "Hà Đình Trung";

document.getElementById("employee").innerHTML =
`${id}(${name})`;

function updateClock(){

    const d = new Date();

    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const day = String(d.getDate()).padStart(2,'0');

    const h = String(d.getHours()).padStart(2,'0');
    const min = String(d.getMinutes()).padStart(2,'0');
    const s = String(d.getSeconds()).padStart(2,'0');

    document.getElementById("clock").innerHTML =
    `${y}-${m}-${day} ${h}:${min}:${s}`;
}

updateClock();
setInterval(updateClock,1000);

let totalSeconds = 8 * 3600 + 32 * 60 + 20;

function updateCountdown(){

    const h = Math.floor(totalSeconds / 3600);
    const m = Math.floor((totalSeconds % 3600) / 60);
    const s = totalSeconds % 60;

    document.getElementById("countdown").innerHTML =
    `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

    if(totalSeconds > 0){
        totalSeconds--;
    }
}

updateCountdown();
setInterval(updateCountdown,1000);

</script>

</body>
</html>
