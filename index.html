<style>

</head>
<body>

<div class="container">

    <!-- ẢNH NỀN MẪU -->
    <img src="bg.jpg" class="background">

    <!-- MÃ NHÂN VIÊN -->
    <div class="employee" id="employee"></div>

    <!-- THỜI GIAN -->
    <div class="clock" id="clock"></div>

    <!-- TRẠNG THÁI -->
    <div class="status">已生效</div>

    <!-- ĐẾM NGƯỢC -->
    <div class="countdown" id="countdown"></div>

    <!-- THÔNG BÁO -->
    <div class="notice">
        尊敬的员工您好，您已进入企业涉密区域，<br>
        出于企业安全考虑，您的手机摄像头将被禁止拍摄，感谢您的配合。
    </div>

</div>

<script>

const params = new URLSearchParams(window.location.search);

const id = params.get("id") || "V25060141";
const name = params.get("name") || "Hà Đình Trung";

document.getElementById("employee").innerHTML =
`${id}(${name})`;

function updateClock(){

    const d = new Date();

    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const day = String(d.getDate()).padStart(2,'0');

    const h = String(d.getHours()).padStart(2,'0');
    const min = String(d.getMinutes()).padStart(2,'0');
    const s = String(d.getSeconds()).padStart(2,'0');

    document.getElementById("clock").innerHTML =
    `${y}-${m}-${day} ${h}:${min}:${s}`;
}

updateClock();
setInterval(updateClock,1000);

let totalSeconds = 8 * 3600 + 32 * 60 + 20;

function updateCountdown(){

    const h = Math.floor(totalSeconds / 3600);
    const m = Math.floor((totalSeconds % 3600) / 60);
    const s = totalSeconds % 60;

    document.getElementById("countdown").innerHTML =
    `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

    if(totalSeconds > 0){
        totalSeconds--;
    }
}

updateCountdown();
setInterval(updateCountdown,1000);

</script>

</body>
</html>
