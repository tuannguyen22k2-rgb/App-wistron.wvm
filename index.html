<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>员工码</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2f3156">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
}

.container{
    position:relative;
    width:100%;
    max-width:430px;
    margin:auto;
}

.background{
    width:100%;
    display:block;
}

.employee{
    position:absolute;
    top:48px;
    left:0;
    right:0;
    text-align:center;
    color:#f5e6b0;
    font-size:18px;
    font-weight:500;
}

.clock{
    position:absolute;
    top:195px;
    left:0;
    right:0;
    text-align:center;
    color:#000;
    font-size:16px;
    font-weight:bold;
}

.status{
    position:absolute;
    top:510px;
    left:0;
    right:0;
    text-align:center;
    color:#67d86f;
    font-size:30px;
    font-weight:bold;
}

.countdown{
    position:absolute;
    top:555px;
    left:0;
    right:0;
    text-align:center;
    color:#67d86f;
    font-size:22px;
}
</style>
</head>
