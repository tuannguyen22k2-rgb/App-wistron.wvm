```html
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wistron QR</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
}

.container{
    position:relative;
    width:100%;
    max-width:430px;
    margin:auto;
}

.background{
    width:100%;
    display:block;
}

.employee{
    position:absolute;
    top:48px;
    left:0;
    right:0;
    text-align:center;
    color:#f5e6b0;
    font-size:18px;
    font-weight:500;
}

.clock{
    position:absolute;
    top:195px;
    left:0;
    right:0;
    text-align:center;
    color:#000;
    font-size:16px;
    font-weight:bold;
}

.status{
    position:absolute;
    top:510px;
    left:0;
    right:0;
    text-align:center;
    color:#67d86f;
    font-size:30px;
    font-weight:bold;
}

.countdown{
    position:absolute;
    top:555px;
    left:0;
    right:0;
    text-align:center;
    color:#67d86f;
    font-size:22px;
}
</style>
</head>

<body>

<div class="container">

    <img src="qrcode.jpg" class="background" alt="">

    <div class="employee" id="employee"></div>

    <div class="clock" id="clock"></div>

    <div class="status">已生效</div>

    <div class="countdown" id="countdown"></div>

</div>

<script>

const params = new URLSearchParams(window.location.search);

const id = params.get("id") || "V25060141";
const name = params.get("name") || "Hà Đình Trung";

document.getElementById("employee").innerHTML =
`${id} (${name})`;

function updateClock(){

    const d = new Date();

    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const day = String(d.getDate()).padStart(2,'0');

    const h = String(d.getHours()).padStart(2,'0');
    const min = String(d.getMinutes()).padStart(2,'0');
    const s = String(d.getSeconds()).padStart(2,'0');

    document.getElementById("clock").innerHTML =
    `${y}-${m}-${day} ${h}:${min}:${s}`;
}

updateClock();
setInterval(updateClock,1000);

let totalSeconds = 8 * 3600 + 32 * 60 + 20;

function updateCountdown(){

    const h = Math.floor(totalSeconds / 3600);
    const m = Math.floor((totalSeconds % 3600) / 60);
    const s = totalSeconds % 60;

    document.getElementById("countdown").innerHTML =
    `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

    if(totalSeconds > 0){
        totalSeconds--;
    }
}

updateCountdown();
setInterval(updateCountdown,1000);

</script>

</body>
</html>
